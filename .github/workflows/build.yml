name: Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ── Windows ─────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: windows-deps-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build
        run: cmake --build build --config Release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RTSChess-Windows
          path: build/Release/RTSChess.exe

  # ── macOS universal (arm64 + x86_64) ─────────────────────────────────────────
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: macos-universal-deps-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build
        run: cmake --build build --config Release

      - name: Verify architectures
        run: lipo -info build/RTSChess

      - name: Package .app bundle
        run: |
          mkdir -p RTSChess.app/Contents/MacOS
          mkdir -p RTSChess.app/Contents/Resources
          cp build/RTSChess RTSChess.app/Contents/MacOS/RTSChess
          cat > RTSChess.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>RTSChess</string>
              <key>CFBundleIdentifier</key>
              <string>com.jgashler.rtschess</string>
              <key>CFBundleName</key>
              <string>RTSChess</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
          </dict>
          </plist>
          EOF
          codesign --force --deep -s - RTSChess.app
          zip -r RTSChess-macOS.zip RTSChess.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RTSChess-macOS
          path: RTSChess-macOS.zip

  # ── Publish rolling release ───────────────────────────────────────────────────
  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: RTSChess-Windows
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: RTSChess-macOS
          path: dist/macos

      - name: Rename for release
        run: |
          mv dist/windows/RTSChess.exe         dist/RTSChess-Windows.exe
          mv dist/macos/RTSChess-macOS.zip     dist/RTSChess-macOS.zip

      - name: Update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: RTSChess
          body: |
            RTSCHESS RTSCHESS RTSCHESS
          prerelease: false
          files: |
            dist/RTSChess-Windows.exe
            dist/RTSChess-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
