name: Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ── Windows ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: windows-deps-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        # OpenSSL is pre-installed on windows-latest at Program Files\OpenSSL
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RTSChess-Windows
          path: build/Release/RTSChess.exe

  # ── macOS (universal: Intel + Apple Silicon) ─────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: macos-deps-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        # brew's OpenSSL is not on the default CMake search path; point to it.
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          -DOPENSSL_ROOT_DIR=$(brew --prefix openssl)

      - name: Build
        run: cmake --build build --config Release

      - name: Sign (ad-hoc)
        run: codesign --force -s - build/RTSChess

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RTSChess-macOS
          path: build/RTSChess
