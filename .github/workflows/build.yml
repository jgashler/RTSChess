name: Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ── Windows ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: windows-deps-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded

      - name: Build
        run: cmake --build build --config Release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RTSChess-Windows
          path: build/Release/RTSChess.exe

  # ── macOS (universal: Intel + Apple Silicon) ─────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: macos-deps-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build
        run: cmake --build build --config Release

      - name: Sign (ad-hoc)
        run: codesign --force -s - build/RTSChess

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RTSChess-macOS
          path: build/RTSChess

  # ── Publish rolling release ───────────────────────────────────────────────
  # Runs after both builds succeed. Downloads the two artifacts, renames them
  # so they're distinguishable, and overwrites the "latest-build" pre-release.
  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: RTSChess-Windows
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: RTSChess-macOS
          path: dist/macos

      - name: Rename for release
        run: |
          mv dist/windows/RTSChess.exe dist/RTSChess-Windows.exe
          mv dist/macos/RTSChess       dist/RTSChess-macOS

      - name: Update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: RTSChess
          body: |
            RTSCHESS RTSCHESS RTSCHESS
          prerelease: false
          files: |
            dist/RTSChess-Windows.exe
            dist/RTSChess-macOS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
